; PlatformIO Project Configuration File
; https://docs.platformio.org/page/projectconf.html
;
; Target: STM32G431KBT6 (LQFP32, 128KB flash, 32KB RAM), flashed via ST-LINK.
;
; BOARD CHOICE -- why `nucleo_g431kb` and not `genericSTM32G431CB`:
; The "CB" part is the LQFP48 package; its variant maps pins (PB10, PB11, PC13,
; PC9...) that do not physically exist on your 32-pin KBT6. PlatformIO has no
; entry for a *bare* G431KB, but `nucleo_g431kb`'s board JSON already declares
; exactly our silicon, so no board_build.*/board_upload.* overrides are needed:
;
;     mcu              stm32g431kbt6      <- our exact part
;     variant          STM32G4xx/G431K(6-8-B)(T-U)_G441KB(T-U)
;     f_cpu            170000000L
;     maximum_size     131072  (128K flash)
;     maximum_ram_size 32768   (32K RAM)
;     upload.protocol  stlink
;
; The only thing the Nucleo definition presumes is an ST-LINK, which is exactly
; how we are programming the chip anyway.
;
; CLOCK (matters on a crystal-less board): the variant's SystemClock_Config()
; runs the PLL from the internal HSI16 (PLLSOURCE_HSI, M=4 N=85 P/Q/R=2 ->
; 170 MHz) and never enables HSE -- ST's own source notes "HSE is available but
; SB9 and SB10 OFF so not usable per default". A bare KBT6 with no external
; crystal therefore boots correctly on the stock config. Don't add an HSE flag
; unless you actually populate a crystal.

[env:STM32G431KBT6]
platform  = ststm32
board     = nucleo_g431kb
framework = arduino

; --- Upload / debug: SWD via ST-LINK ---
upload_protocol = stlink
debug_tool      = stlink

build_flags =
    -Wall

; Serial is disabled in firmware (ENABLE_SERIAL 0), so no USB CDC is configured.
; Note HAL_TIM_MODULE_ENABLED / HAL_I2C_MODULE_ENABLED are deliberately NOT set
; here: the core already enables both, and redefining them only emits warnings.
