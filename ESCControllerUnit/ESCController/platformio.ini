; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:STM32G431KBT6]
platform = ststm32
board = genericSTM32G431CB
board_build.mcu = stm32g431kbt6
board_build.variant = STM32G4xx/G431K(6-8-B)(T-U)_G441KB(T-U)
framework = arduino

; Flash via STM32CubeProgrammer CLI (avoids OpenOCD libusb access issues on Windows)
upload_protocol = custom
upload_flags =
	-c
	port=SWD
	sn=001A00254142501920353451
	mode=HOTPLUG
	freq=1000
	reset=SWrst
	-w
	$SOURCE
	0x08000000
	-v
	-rst
upload_command = "C:/Program Files (x86)/STMicroelectronics/STM32Cube/STM32CubeProgrammer/bin/STM32_Programmer_CLI.exe" $UPLOAD_FLAGS

; Keep ST-Link as debugger tool
debug_tool = stlink
monitor_speed = 115200