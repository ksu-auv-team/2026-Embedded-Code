; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:STM32G431KBT6]
platform = ststm32
board = genericSTM32G431CB
board_build.mcu = stm32g431kbt6
board_build.variant = STM32G4xx/G431K(6-8-B)(T-U)_G441KB(T-U)
framework = arduino
upload_protocol = stlink
debug_tool = stlink
monitor_speed = 115200
build_flags =
	-Wall -Wextra
	-DUSBCON
	-DUSBD_USE_CDC
	-DUSB_PRODUCT="\"G431 Environment Monitoring Unit\""
	; IMU UART runs at 3 Mbaud (~300 KB/s); the default 64-byte HardwareSerial
	; RX ring buffer overflows between loop() iterations and breaks frame sync.
	; Enlarge it so a burst of SHTP reports survives until imu_source drains it.
	-DSERIAL_RX_BUFFER_SIZE=1024
lib_deps = 7semi-solutions/7Semi BNO08x@^1.0.1
