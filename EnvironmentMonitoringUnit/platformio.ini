; PlatformIO Project Configuration File
;
; Target: STM32G431KBT6 (32-pin LQFP "K" package, 32K RAM / 128K Flash)
; Programmer: external ST-Link over SWD
;
; Note: there is no stock "generic G431KB" board, so we start from the C-package
; generic board and override the MCU + variant to the correct K-package pinout.
; This keeps a bare (non-Nucleo) board while giving the Arduino core the right
; pin -> port/AF maps for the 32-pin part.
;
; https://docs.platformio.org/page/projectconf.html

[env:STM32G431KBT6]
platform = ststm32
board = genericSTM32G431CB
board_build.mcu = stm32g431kbt6
board_build.variant = STM32G4xx/G431K(6-8-B)(T-U)_G441KB(T-U)
framework = arduino

; Flash/debug via external ST-Link
upload_protocol = stlink
debug_tool = stlink

; Native USB CDC is compiled in for every build (PA11/PA12). Whether the USB
; port is actually used - for the RX->USB echo bridge and/or the heartbeat - is
; chosen at runtime by the flags in include/config.h, NOT by the build env.
; USB runs crystal-less on this part via HSI48 + CRS (no external 48 MHz xtal).
monitor_speed = 115200

build_flags =
    -Wall -Wextra
    -DUSBCON
    -DUSBD_USE_CDC
    -DUSB_PRODUCT="\"G431 Environment Monitoring Unit\""
